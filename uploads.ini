; QAProof custom PHP limits — large design images (full-page PNGs can be 30MB+)
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
; 900s = 15 min — comfortably covers worst-case regression poll loop
; (30 attempts x up to 25s each = ~750s) + baseline capture (~90s).
max_execution_time = 900
max_input_time = 900
