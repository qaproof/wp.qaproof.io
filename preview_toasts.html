<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toast & Confirm Preview – QAProof</title>
  <link href="https://fonts.googleapis.com/css2?family=Kodchasan:wght@400;500;600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --teal: #00ADB5;
      --font-heading: 'Kodchasan', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }
    body {
      font-family: var(--font-body);
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 13px 28px;
      border-radius: 100px;
      border: none;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-error  { background: #1c1a1a; color: #fca5a5; }
    .btn-success { background: #0f1e1c; color: #6ee7b7; }
    .btn-confirm { background: #1a1f2e; color: #e5e7eb; border: 1px solid rgba(255,255,255,0.1); }

    /* ── Toast container ── */
    #toastContainer {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      pointer-events: all;
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px 18px;
      border-radius: 14px;
      min-width: 300px;
      max-width: 380px;
      overflow: hidden;
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      animation: toastSlideIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .toast.toast-hide { opacity: 0; transform: translateX(16px); }
    .toast-error {
      background: #1c1a1a;
      color: #fca5a5;
      box-shadow: 0 8px 32px rgba(239,68,68,0.25), 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(239,68,68,0.25);
    }
    .toast-success {
      background: #0f1e1c;
      color: #6ee7b7;
      box-shadow: 0 8px 32px rgba(0,173,181,0.25), 0 2px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(0,173,181,0.25);
    }
    .toast-error .toast-icon-wrap { background: rgba(239,68,68,0.15); color: #f87171; }
    .toast-success .toast-icon-wrap { background: rgba(0,173,181,0.15); color: #2DD4BF; }
    .toast-error .toast-msg { color: #fef2f2; }
    .toast-success .toast-msg { color: #ecfdf5; }
    .toast-error .toast-close { color: #fca5a5; }
    .toast-success .toast-close { color: #6ee7b7; }
    .toast-error .toast-progress { background: #ef4444; }
    .toast-success .toast-progress { background: var(--teal); }
    .toast-icon-wrap {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .toast-icon { width: 18px; height: 18px; }
    .toast-body { flex: 1; min-width: 0; }
    .toast-title {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 2px;
    }
    .toast-msg { font-size: 13.5px; }
    .toast-close {
      background: none; border: none; cursor: pointer;
      opacity: 0.45; padding: 2px; flex-shrink: 0;
      line-height: 1; font-size: 14px;
      transition: opacity 0.15s; margin-top: 1px;
    }
    .toast-close:hover { opacity: 1; }
    .toast-progress {
      position: absolute; bottom: 0; left: 0;
      height: 3px; border-radius: 0 0 14px 14px;
      animation: toastProgress linear forwards;
      transform-origin: left;
    }
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateX(28px) scale(0.96); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastProgress {
      from { width: 100%; } to { width: 0%; }
    }

    /* ── Confirm ── */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(10,14,20,0.6);
      backdrop-filter: blur(6px);
      z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: confirmFadeIn 0.18s ease both;
    }
    .confirm-dialog {
      background: #1a1f2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px 28px 24px;
      max-width: 380px; width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: confirmSlideUp 0.25s cubic-bezier(0.16,1,0.3,1) both;
      font-family: var(--font-body);
    }
    .confirm-icon-wrap {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .confirm-icon-danger { background: rgba(239,68,68,0.15); color: #f87171; }
    .confirm-message { font-size: 15px; color: #e5e7eb; line-height: 1.65; margin: 0 0 24px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-btn {
      padding: 10px 22px; border-radius: 100px;
      font-family: var(--font-heading); font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .confirm-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .confirm-cancel { background: rgba(255,255,255,0.08); color: #9ca3af; }
    .confirm-ok-danger { background: #ef4444; color: #fff; }
    @keyframes confirmFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes confirmSlideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <button class="btn-error" onclick="showToast('Invalid email or password.', 'error')">Show error toast</button>
  <button class="btn-success" onclick="showToast('Profile saved successfully!', 'success')">Show success toast</button>
  <button class="btn-confirm" onclick="showConfirmDemo()">Show confirm dialog</button>

  <div id="toastContainer"></div>

  <script>
    function showToast(message, type = 'error', duration = 4500) {
      const container = document.getElementById('toastContainer');
      container.querySelectorAll('.toast').forEach(t => t.remove());
      const label = type === 'error' ? 'Error' : 'Success';
      const errorIcon = `<svg class="toast-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z" clip-rule="evenodd"/></svg>`;
      const successIcon = `<svg class="toast-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg>`;
      const iconSvg = type === 'error' ? errorIcon : successIcon;

      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <div class="toast-icon-wrap">${iconSvg}</div>
        <div class="toast-body">
          <div class="toast-title">${label}</div>
          <div class="toast-msg">${message}</div>
        </div>
        <button class="toast-close" aria-label="Dismiss">✕</button>
        <div class="toast-progress" style="animation-duration:${duration}ms;"></div>`;

      const closeBtn = toast.querySelector('.toast-close');
      function dismiss() {
        toast.classList.add('toast-hide');
        setTimeout(() => toast.remove(), 320);
      }
      closeBtn.addEventListener('click', dismiss);
      container.appendChild(toast);
      const timer = setTimeout(dismiss, duration);
      closeBtn.addEventListener('click', () => clearTimeout(timer));
    }

    function showConfirmDemo() {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-dialog">
          <div class="confirm-icon-wrap confirm-icon-danger">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <p class="confirm-message">Delete this API key? It will stop working immediately.</p>
          <div class="confirm-actions">
            <button class="confirm-btn confirm-cancel" id="_cancel">Cancel</button>
            <button class="confirm-btn confirm-ok-danger" id="_ok">Delete</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      function close() {
        overlay.style.opacity = '0';
        overlay.style.transition = 'opacity 0.15s ease';
        setTimeout(() => overlay.remove(), 160);
      }
      overlay.querySelector('#_ok').addEventListener('click', () => { close(); showToast('Key deleted.', 'error'); });
      overlay.querySelector('#_cancel').addEventListener('click', close);
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
    }
  </script>
</body>
</html>
